<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hirzam Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <header>
      <h1> Hirzam Chat</h1>
      <span id="status-badge" class="badge disconnected">Disconnected</span>
    </header>

    <div id="messages-container"></div>

    <form id="send-form">
      <input
        id="username"
        type="text"
        placeholder="Votre nom"
        maxlength="100"
        required
      />
      <textarea
        id="content"
        placeholder="Votre message…"
        maxlength="2000"
        required
      ></textarea>
      <button type="submit">Send</button>
    </form>

  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-box">
      <p class="modal-title">> edit message</p>
      <textarea id="edit-content" rows="4"></textarea>
      <div class="modal-actions">
        <button id="btn-cancel-edit">cancel</button>
        <button id="btn-confirm-edit">confirm</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vertx3-eventbus-client@3.9.4/vertx-eventbus.js"></script>
  <script src="app.js"></script>

</body>
</html>
